name: 出走表データ自動更新

on:
  schedule:
    # 毎日 日本時間 朝8時半 (UTC 23:30) に実行（モーター更新と少しずらす）
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 pandas lxml
      - run: python scripts/scrape_racers.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "出走表データ自動更新 $(date +'%Y-%m-%d')"
          git push
