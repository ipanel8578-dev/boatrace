name: 見どころJSON自動生成

on:
  workflow_run:
    workflows: ["出走表データ自動更新"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-highlights
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 見どころJSONを生成
        run: |
          python scripts/build_highlights.py \
            docs/racers/racers_today.csv \
            docs/motor/motors_all.csv \
            docs/highlights/highlights.json

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/highlights/highlights.json
          git diff --staged --quiet || git commit -m "auto: update highlights.json"
          git push
