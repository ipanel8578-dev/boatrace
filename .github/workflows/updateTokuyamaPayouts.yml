name: update tokuyama payouts

on:
  schedule:
    - cron: '20 0 * * *'
    - cron: '20 1 * * *'
  workflow_dispatch:
    inputs:
      ym:
        description: '回収する月 (例 202604)。空欄なら直近12ヶ月ぶん巡回。'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: boatrace-payouts
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: scrape payouts
        continue-on-error: true
        timeout-minutes: 300
        env:
          YM: ${{ github.event.inputs.ym }}
        run: python scripts/scrapeTokuyamaPayouts.py

      - name: build man rate json
        if: always()
        run: python scripts/buildTokuyamaManRate.py

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/payouts/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "update tokuyama payouts"
            git pull --rebase origin main
            git push
          fi
