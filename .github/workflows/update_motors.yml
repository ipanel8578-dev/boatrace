name: モーターデータ自動更新

on:
  schedule:
    # 毎日 日本時間 朝8時 (UTC 23時) に実行
    - cron: '0 23 * * *'
  workflow_dispatch:   # 手動実行も可能にする

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 必要ライブラリをインストール
        run: pip install requests beautifulsoup4 pandas lxml

      - name: スクレイピング実行
        run: python scripts/scrape_motors.py

      - name: 結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "モーターデータ自動更新 $(date +'%Y-%m-%d')"
          git push
