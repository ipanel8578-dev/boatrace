<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOATRACE 選手図鑑 2026前期</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1219; font-family:'Helvetica Neue',Arial,sans-serif; color:#e0e6ed; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [players, setPlayers] = useState([]);
  const [prof, setProf] = useState({});
  const [search, setSearch] = useState("");
  const [femaleOnly, setFemaleOnly] = useState(false);
  const [open, setOpen] = useState(null);

  useEffect(() => {
    fetch('./profile.json')
      .then(r => r.json())
      .then(data => setProf(data));
  }, []);

  // 簡易選手リスト（実際はCSVから読むロジックを維持したい場合は教えて）
  const samplePlayers = []; // ここは既存ロジックに置き換え

  return (
    <div style={{padding:"16px",maxWidth:"600px",margin:"0 auto"}}>
      <h1 style={{color:"#ffd166",textAlign:"center",marginBottom:"20px"}}>BOATRACE 選手図鑑</h1>
      {/* 検索・フィルタ部分は省略可 */}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* 選手カード例 */}
        {Object.keys(prof).slice(0,20).map(no => {
          const p = prof[no];
          return (
            <div key={no} style={{background:"#0f1923",borderRadius:12,padding:"14px",borderLeft:"4px solid #4a90e2"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:"18px",fontWeight:"800"}}>{p.name || "選手"}</div>
                  {p.nickname && <div style={{color:"#ff7eb6",fontSize:"13px",marginTop:"2px"}}>♥ {p.nickname}</div>}
                  {p.tagline && <div style={{color:"#ffd166",fontSize:"12px"}}>{p.tagline}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:"20px",color:"#ffd166",fontWeight:"800"}}>7.XX</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
