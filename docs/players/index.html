const BRANCHES = [...new Set(RAW.map(r => r[2]))].sort();
const CLASSES = ["A1","A2","B1","B2"];
const CLASS_COLORS = { A1:"#e63946", A2:"#f4845f", B1:"#457b9d", B2:"#6c757d" };

function Racer({ r, onClick, isOpen }) {
  const [id,name,branch,cls,age,h,w,blood,gender,wr,sr,f1,f2,starts,finals,wins,avgST,
    c1n,c1r,c2n,c2r,c3n,c3r,c4n,c4r,c5n,c5r,c6n,c6r,prevC,prevC2,pi,term] = r;
  return (
    <div style={{background:isOpen?"#1a2332":"#0f1923",borderLeft:`3px solid ${CLASS_COLORS[cls]||"#555"}`,marginBottom:2,borderRadius:4,overflow:"hidden"}}>
      <div onClick={onClick} style={{display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center",padding:"10px 12px",cursor:"pointer",gap:8}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,minWidth:0}}>
          <span style={{background:CLASS_COLORS[cls],color:"#fff",fontSize:11,fontWeight:700,padding:"2px 6px",borderRadius:3,flexShrink:0}}>{cls}</span>
          <span style={{color:"#e0e6ed",fontWeight:600,fontSize:15,whiteSpace:"nowrap"}}>{name}</span>
          <span style={{color:"#6b7f95",fontSize:12,flexShrink:0}}>{branch}</span>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"baseline",flexShrink:0}}>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#ffd166",fontSize:16,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{wr}</div>
            <div style={{color:"#6b7f95",fontSize:10}}>勝率</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#a8dadc",fontSize:14,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{sr}</div>
            <div style={{color:"#6b7f95",fontSize:10}}>複勝率</div>
          </div>
        </div>
      </div>
      {isOpen && (
        <div style={{padding:"0 12px 12px",borderTop:"1px solid #1e2d3d"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:6,marginTop:10,marginBottom:12}}>
            {[["登番",id],["年齢",age+"歳"],["身長",h+"cm"],["体重",w+"kg"],
              ["血液型",blood+"型"],["平均ST",avgST],["出走",starts],["1着",f1],
              ["2着",f2],["優出",finals],["優勝",wins],["期",term],
              ["前期級",prevC],["前々期級",prevC2],["能力指数",pi],["性別",gender==="男"?"♂":"♀"]
            ].map(([label,val],i) => (
              <div key={i} style={{background:"#162232",borderRadius:4,padding:"6px 8px",textAlign:"center"}}>
                <div style={{color:"#6b7f95",fontSize:10,marginBottom:2}}>{label}</div>
                <div style={{color:"#e0e6ed",fontSize:13,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{color:"#8faabe",fontSize:12,fontWeight:600,marginBottom:6}}>コース別複勝率</div>
          <div style={{display:"flex",gap:4}}>
            {[[1,c1n,c1r],[2,c2n,c2r],[3,c3n,c3r],[4,c4n,c4r],[5,c5n,c5r],[6,c6n,c6r]].map(([c,n,rate]) => {
              const pct = Math.min(parseFloat(rate)/8*100,100);
              return (
                <div key={c} style={{flex:1,textAlign:"center"}}>
                  <div style={{color:"#6b7f95",fontSize:10,marginBottom:4}}>{c}コース</div>
                  <div style={{height:40,background:"#0a1520",borderRadius:3,position:"relative",overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                    <div style={{width:"100%",height:pct+"%",background:`hsl(${200+pct*1.2},70%,50%)`,borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>
                  </div>
                  <div style={{color:"#a8dadc",fontSize:11,fontWeight:600,marginTop:2}}>{rate}</div>
                  <div style={{color:"#4a6070",fontSize:9}}>{n}回</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [search, setSearch] = useState("");
  const [classFilter, setClassFilter] = useState("ALL");
  const [branchFilter, setBranchFilter] = useState("ALL");
  const [sortBy, setSortBy] = useState("wr");
  const [openId, setOpenId] = useState(null);
  const [limit, setLimit] = useState(50);

  const filtered = useMemo(() => {
    let list = RAW.filter(r => {
      if (classFilter !== "ALL" && r[3] !== classFilter) return false;
      if (branchFilter !== "ALL" && r[2] !== branchFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!r[1].toLowerCase().includes(q) && !r[0].includes(q) && !r[2].includes(q)) return false;
      }
      return true;
    });
    const sortFns = {
      wr: (a,b) => parseFloat(b[9])-parseFloat(a[9]),
      sr: (a,b) => parseFloat(b[10])-parseFloat(a[10]),
      st: (a,b) => parseFloat(a[16])-parseFloat(b[16]),
      starts: (a,b) => b[13]-a[13],
      id: (a,b) => parseInt(a[0])-parseInt(b[0]),
    };
    list.sort(sortFns[sortBy] || sortFns.wr);
    return list;
  }, [search, classFilter, branchFilter, sortBy]);

  const shown = filtered.slice(0, limit);

  return (
    <div style={{background:"#0b1219",minHeight:"100vh",color:"#e0e6ed",fontFamily:"'Helvetica Neue',Arial,sans-serif"}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:"linear-gradient(180deg,#0b1219 85%,transparent)",padding:"12px 12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{fontSize:20,fontWeight:800,color:"#ffd166",letterSpacing:-0.5}}>BOATRACE</div>
          <div style={{fontSize:13,color:"#6b7f95"}}>2026前期 全{RAW.length}選手</div>
        </div>
        <input type="text" placeholder="選手名 / 登番 / 支部で検索..." value={search}
          onChange={e=>{setSearch(e.target.value);setLimit(50);}}
          style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",background:"#162232",border:"1px solid #1e2d3d",borderRadius:6,color:"#e0e6ed",fontSize:14,outline:"none",marginBottom:8}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
          {["ALL",...CLASSES].map(c => (
            <button key={c} onClick={()=>{setClassFilter(c);setLimit(50);}} style={{
              padding:"4px 10px",fontSize:12,fontWeight:600,border:"none",borderRadius:4,cursor:"pointer",
              background:classFilter===c?(CLASS_COLORS[c]||"#ffd166"):"#162232",
              color:classFilter===c?"#fff":"#6b7f95"
            }}>{c==="ALL"?"全級":c}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select value={branchFilter} onChange={e=>{setBranchFilter(e.target.value);setLimit(50);}}
            style={{padding:"4px 8px",fontSize:12,background:"#162232",color:"#e0e6ed",border:"1px solid #1e2d3d",borderRadius:4}}>
            <option value="ALL">全支部</option>
            {BRANCHES.map(b => <option key={b} value={b}>{b}</option>)}
          </select>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            style={{padding:"4px 8px",fontSize:12,background:"#162232",color:"#e0e6ed",border:"1px solid #1e2d3d",borderRadius:4}}>
            <option value="wr">勝率順</option>
            <option value="sr">複勝率順</option>
            <option value="st">ST順</option>
            <option value="starts">出走数順</option>
            <option value="id">登番順</option>
          </select>
          <span style={{color:"#6b7f95",fontSize:12,marginLeft:"auto"}}>{filtered.length}名</span>
        </div>
      </div>
      <div style={{padding:"0 8px 20px"}}>
        {shown.map(r => (
          <Racer key={r[0]} r={r} isOpen={openId===r[0]} onClick={()=>setOpenId(openId===r[0]?null:r[0])}/>
        ))}
        {filtered.length > limit && (
          <button onClick={()=>setLimit(l=>l+50)} style={{
            width:"100%",padding:12,background:"#162232",border:"1px solid #1e2d3d",borderRadius:6,
            color:"#8faabe",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:8
          }}>さらに50件読み込む（残り{filtered.length-limit}件）</button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
