<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実況アナ図鑑 | データ攻め</title>
<style>
  :root{
    --bg:#0b1219; --card:#121c26; --card2:#16222e;
    --line:#1f2e3c; --txt:#e7eef5; --sub:#8aa0b4;
    --accent:#ffd166; --water:#5bc8e0; --pink:#ff7eb6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.6;padding-bottom:60px}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}
  header{padding:22px 0 12px;border-bottom:1px solid var(--line);margin-bottom:14px}
  h1{font-size:21px;letter-spacing:.02em}
  h1 .dot{color:var(--accent)}
  .lead{color:var(--sub);font-size:13px;margin-top:4px}
  .back{display:inline-block;color:var(--sub);font-size:13px;margin-bottom:10px;text-decoration:none}
  .note{background:#1a2330;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--sub);margin-bottom:14px}
  .note b{color:var(--accent)}
  /* controls */
  .controls{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .search{width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  .search::placeholder{color:#5e7184}
  .filters{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:6px 11px;background:var(--card);border:1px solid var(--line);border-radius:999px;color:var(--sub);font-size:12.5px;cursor:pointer;user-select:none}
  .chip.on{background:var(--accent);color:#1a1305;border-color:var(--accent);font-weight:700}
  .count{color:var(--sub);font-size:12px;margin-bottom:10px}
  /* list */
  .anc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
  .av{flex:none;width:42px;height:42px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--accent)}
  .av.f{color:var(--pink)}
  .main{flex:1;min-width:0}
  .nm{font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .yomi{font-size:11px;color:var(--sub);font-weight:400}
  .nick{font-size:11px;background:#3a2d08;color:var(--accent);border:1px solid #5a4710;padding:1px 7px;border-radius:999px;font-weight:600}
  .vlist{margin-top:3px;display:flex;flex-wrap:wrap;gap:4px}
  .vtag{font-size:11px;background:var(--card2);border:1px solid var(--line);color:var(--sub);padding:1px 8px;border-radius:6px}
  .arrow{flex:none;color:var(--sub);font-size:13px;transition:transform .2s}
  .anc.open .arrow{transform:rotate(90deg)}
  .body{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
  .anc.open .body{display:block}
  .body .row{font-size:13px;margin-top:10px}
  .body .lbl{color:var(--sub);font-size:11px;letter-spacing:.04em;margin-bottom:2px}
  .body .src a{color:var(--water);font-size:12px;word-break:break-all}
  .empty{color:var(--sub);text-align:center;padding:30px 0;font-size:14px}
  footer{color:var(--sub);font-size:11px;text-align:center;margin-top:26px;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>実況アナ図鑑<span class="dot">.</span></h1>
    <div class="lead">全国24場の実況アナウンサー名鑑。場の顔を知ると、レースがもっと面白い。</div>
  </header>

  <div class="note">
    <b>ご注意</b>　実況アナ情報は当サイト調べ（公開情報・聞き取りベース）です。実況は<b>交代制・臨時担当</b>があり、ここに載らない担当回もあります。異動・誤りに気づいたらご指摘ください。
  </div>

  <div class="controls">
    <input class="search" id="q" placeholder="名前・ふりがな・場名・異名で検索">
    <div class="filters" id="regionFilters"></div>
    <div class="filters">
      <span class="chip" data-sort="venue">場順</span>
      <span class="chip" data-sort="name">名前順</span>
      <span class="chip" id="nickOnly">異名つきのみ</span>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div id="list"></div>

  <footer>
    データ攻め｜実況アナ図鑑<br>
    買い目・予想は出しません。検証できるデータと、楽しむための読み物を。
  </footer>
</div>

<script>
const VENUE_ORDER=["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
const REGIONS={
 "関東":["桐生","戸田","江戸川","平和島","多摩川"],
 "東海":["浜名湖","蒲郡","常滑","津"],
 "近畿":["三国","びわこ","住之江","尼崎"],
 "中国四国":["鳴門","丸亀","児島","宮島","徳山","下関"],
 "九州":["若松","芦屋","福岡","唐津","大村"]
};
let DATA=[], state={q:"",region:"",sort:"venue",nick:false};

function venueRank(a){let m=99;a.venues.forEach(v=>{const i=VENUE_ORDER.indexOf(v);if(i>=0&&i<m)m=i});return m}
function isFemale(a){ // 名前末尾の女性名 or ローテ女性陣 で簡易判定（バッジ色のみに使用）
  const f=["美生","ゆりな","裕美","美記","尚美","春美","美希","美和","由美","恵","ナツキ"];
  return f.some(s=>a.name.endsWith(s));
}
function initials(n){return n.slice(0,1)}

function buildRegionChips(){
  const box=document.getElementById('regionFilters');
  box.innerHTML='<span class="chip on" data-region="">全地区</span>'+
    Object.keys(REGIONS).map(r=>`<span class="chip" data-region="${r}">${r}</span>`).join('');
  box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    box.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); state.region=c.dataset.region; render();
  });
}

function matchRegion(a){
  if(!state.region) return true;
  const vs=REGIONS[state.region];
  return a.venues.some(v=>vs.includes(v));
}
function matchQ(a){
  if(!state.q) return true;
  const q=state.q.toLowerCase();
  const hay=[a.name,a.yomi,a.nickname,...(a.venues||[])].join(' ').toLowerCase();
  return hay.includes(q);
}

function render(){
  let list=DATA.filter(a=>matchRegion(a)&&matchQ(a)&&(!state.nick||a.nickname));
  if(state.sort==="name") list.sort((a,b)=>(a.yomi||a.name).localeCompare(b.yomi||b.name,'ja'));
  else list.sort((a,b)=>venueRank(a)-venueRank(b)||(a.yomi||a.name).localeCompare(b.yomi||b.name,'ja'));

  document.getElementById('count').textContent=`${list.length}人`;
  const box=document.getElementById('list');
  if(!list.length){box.innerHTML='<div class="empty">該当なし</div>';return}
  box.innerHTML=list.map(a=>{
    const fem=isFemale(a);
    const nick=a.nickname?`<span class="nick">${a.nickname}</span>`:'';
    const yomi=a.yomi?`<span class="yomi">${a.yomi}</span>`:'';
    const vtags=a.venues.map(v=>`<span class="vtag">${v}</span>`).join('');
    const note=a.note?`<div class="row"><div class="lbl">プロフィール</div>${a.note}</div>`:'';
    const src=a.source?`<div class="row src"><div class="lbl">出典</div><a href="${a.source}" target="_blank" rel="noopener">${a.source}</a></div>`:'';
    return `<div class="anc">
      <div class="head" onclick="this.parentNode.classList.toggle('open')">
        <div class="av ${fem?'f':''}">${initials(a.name)}</div>
        <div class="main">
          <div class="nm">${a.name}${yomi}${nick}</div>
          <div class="vlist">${vtags}</div>
        </div>
        <div class="arrow">▶</div>
      </div>
      <div class="body">${note}${src||''}
        ${!note&&!src?'<div class="row" style="color:var(--sub)">公開されている確かなプロフィール情報が揃い次第、追記します。</div>':''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();render()});
document.querySelectorAll('[data-sort]').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');state.sort=c.dataset.sort;render();
});
document.getElementById('nickOnly').onclick=function(){this.classList.toggle('on');state.nick=this.classList.contains('on');render()};

fetch('announcers.json?v='+Date.now())
  .then(r=>r.json())
  .then(d=>{DATA=d;buildRegionChips();document.querySelector('[data-sort="venue"]').classList.add('on');render()})
  .catch(()=>{document.getElementById('list').innerHTML='<div class="empty">データを読み込めませんでした</div>'});
</script>
</body>
</html>
