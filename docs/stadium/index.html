<script>window.__D = {"stadiums": [{"code": "01", "name": "桐生", "area": "関東", "water": "淡水", "in1": "約53%", "feature": "標高が高く空気が薄いためモーター出足が鈍い。日没後は冷えてさらに伸び型有利。広い水面。", "arare": "中", "tenkei": "本線 1-2 / 1-3。風が出ると 1-4 や 3-1 のまくり差し決着も", "sign": "夜の冷え込みと赤城おろし(北西風)が強まるとイン不利。風速5m超で2・3コースの攻めが決まりやすい。"}, {"code": "02", "name": "戸田", "area": "関東", "water": "淡水", "in1": "約45%(全国最低級)", "feature": "全国一狭い水面。1マークが狭くインが回りきれず差し・まくりが決まりやすい。", "arare": "高", "tenkei": "2-1 / 3-1 の差し・まくり差しが多発。1-2 の本線信頼度は低め", "sign": "そもそもイン信頼度が低い。インがB級や当地経験浅いと2・3コースから一気。狭水面でまくり差しの大穴も。"}, {"code": "03", "name": "江戸川", "area": "関東", "water": "汽水", "in1": "約48%", "feature": "日本唯一の河川コース。潮の満ち引きと風でうねり発生。難水面の代表格。", "arare": "高", "tenkei": "2-X / 4-X の差し・まくり台頭。荒天時は高配当の決着が頻発", "sign": "風速・うねり次第で大荒れ。満潮干潮の前後、風速7m超は要警戒。地元・当地巧者を最優先、よそ者のインは飛ぶ。"}, {"code": "04", "name": "平和島", "area": "関東", "water": "海水", "in1": "約49%", "feature": "潮位変化と風の影響を受けやすい。1コース信頼度が低く差しが効く。", "arare": "高", "tenkei": "2-1 / 2-3 の差し決着が多い。1-2 の堅軸は過信禁物", "sign": "インの信頼度が低い。2コース差し・3コースまくりが決まりやすく、堅いと見て1点勝負は危険。"}, {"code": "05", "name": "多摩川", "area": "関東", "water": "淡水", "in1": "約55%", "feature": "日本一きれいで穏やかな静水面。実力が反映されやすく差しも伸びも決まる。", "arare": "中", "tenkei": "本線 1-2 / 1-3。モーター良な外枠が絡む 1-4 / 4-1 も", "sign": "静水面ゆえモーター差がそのまま出る。エース機を持つ選手が外枠なら一発あり。風が出ると一転波乱も。"}, {"code": "06", "name": "浜名湖", "area": "東海", "water": "汽水", "in1": "約55%", "feature": "広い水面で全コースが攻めやすい。前づけ・進入隊形の乱れが起きやすい。", "arare": "中", "tenkei": "本線 1-2 / 1-3。進入乱れ時は 4-1 / 3-1 のまくり差しも", "sign": "進入が乱れたレースは荒れやすい。横風(西風)が強い日や前づけ巧者がいるレースは隊形を要チェック。"}, {"code": "07", "name": "蒲郡", "area": "東海", "water": "汽水", "in1": "約57%", "feature": "ナイターの代表格。比較的穏やかでインが強め。差しも決まる。", "arare": "低", "tenkei": "本線 1-2 / 1-3。差しが効くので 1-2 の信頼度が高い", "sign": "基本は堅め。荒れるのはインがスタート遅れたとき。ナイター後半は照明・気温変化で動くことも。"}, {"code": "08", "name": "常滑", "area": "東海", "water": "海水", "in1": "約57%", "feature": "広い水面。伊勢湾からの強風(特に西風)で水面が荒れることがある。前づけ多め。", "arare": "中", "tenkei": "本線 1-2 / 1-3。西風強・進入乱れ時は 3-1 / 4-1 のまくり", "sign": "西風が強まると一気に難水面化。進入隊形の乱れ＋風でイン受難。風速指標を要チェック。"}, {"code": "09", "name": "津", "area": "東海", "water": "淡水", "in1": "約56%", "feature": "穏やかな水面だが季節風(鈴鹿おろし)で荒れる日がある。", "arare": "中", "tenkei": "本線 1-2 / 1-3。風が出ると 1-4 / 3-1 の攻め決着も", "sign": "冬場の向かい風・追い風が強い日は注意。普段は堅めだが風が出ると差し・まくりが効く。"}, {"code": "10", "name": "三国", "area": "近畿", "water": "淡水", "in1": "約56%", "feature": "ピット離れが重要。差しが決まりやすい。午後は強風が吹くことも。", "arare": "中", "tenkei": "本線 1-2 / 1-3。3コースの攻めが効き 3-1 / 1-3 が増える", "sign": "午後の風が強まると荒れやすい。3コースの攻めが効く水面で、3コースに実力者がいると注意。"}, {"code": "11", "name": "びわこ", "area": "近畿", "water": "淡水", "in1": "約52%", "feature": "標高が高く水質は硬め。うねりが残りやすく難水面寄り。", "arare": "高", "tenkei": "1-2 本線だが信頼度低め。うねり時は 2-X / 4-X の波乱", "sign": "うねりと比叡おろしで荒れる。1コース信頼度はやや低め。地元・当地巧者を重視、よそ者インは過信禁物。"}, {"code": "12", "name": "住之江", "area": "近畿", "water": "淡水", "in1": "約58%", "feature": "格式高い静水面のナイター場。実力反映度が高くインが強い。", "arare": "低", "tenkei": "本線 1-2 / 1-3。実力反映度が高く堅い決着が中心", "sign": "基本堅い。荒れるのはインがB級やスタート未熟なとき。静水面ゆえモーター良な外枠の伸びに注意。"}, {"code": "13", "name": "尼崎", "area": "近畿", "water": "淡水", "in1": "約58%", "feature": "閉鎖的で風の影響が少なく穏やか。インが強くまくりにくい。", "arare": "低", "tenkei": "本線 1-2 / 1-3。まくりにくく 1-X の堅軸が機能", "sign": "全国でも堅い部類。荒れ要素は少ないが、強い向かい風の日のみ差し台頭。基本はイン重視。"}, {"code": "14", "name": "鳴門", "area": "四国", "water": "海水", "in1": "約50%(イン弱め)", "feature": "潮の干満とうねりで難水面。1コースが飛びやすく2コース差しが決まる。", "arare": "高", "tenkei": "2-1 / 2-3 の差し、4-X のまくり台頭。1-2 は飛びやすい", "sign": "うねり・潮で大荒れ必至の日も。1コース信頼度が低く2・4コースが台頭。地元巧者と当地勝率を最重視。"}, {"code": "15", "name": "丸亀", "area": "四国", "water": "海水", "in1": "約57%", "feature": "ナイター。潮の影響はあるが比較的穏やか。インが強め。", "arare": "低", "tenkei": "本線 1-2 / 1-3。満潮時はやや差し有利で 1-2 中心", "sign": "基本堅め。満潮時はうねりが出てやや差し有利に。風が弱ければイン中心で組み立て可。"}, {"code": "16", "name": "児島", "area": "中国", "water": "海水", "in1": "約57%", "feature": "潮の影響を受ける。比較的インが強いが満潮時はうねる。", "arare": "中", "tenkei": "本線 1-2 / 1-3。満潮うねり時は 3-1 / 2-1 の攻め決着", "sign": "満潮前後でうねりが出ると差し・まくり差しが台頭。干潮の穏やかな時間帯はイン中心でOK。"}, {"code": "17", "name": "宮島", "area": "中国", "water": "海水", "in1": "約58%", "feature": "潮の流れが速い。流れに乗る差しが決まりやすいがインも強い。", "arare": "中", "tenkei": "本線 1-2 / 1-3。流れの速い時間帯は 2-1 の差しが増える", "sign": "潮の流れが速い時間帯は差しが一気に決まる。干満の変わり目を要チェック。普段はイン軸。"}, {"code": "18", "name": "徳山", "area": "中国", "water": "海水", "in1": "約65%(全国1位)", "feature": "1マークが狭く全国屈指のイン天国。1コースが圧倒的に強い。", "arare": "低", "tenkei": "本線 1-2 / 1-3。イン圧倒的で 1-X の頭固定が機能", "sign": "全国一堅い。荒れるのは1号艇がB級・前づけで隊形が乱れたとき。基本はイン1点級の信頼度。"}, {"code": "19", "name": "下関", "area": "中国", "water": "海水", "in1": "約63%(上位)", "feature": "ナイター。穏やかでインが非常に強い。鉄板場の代表格。", "arare": "低", "tenkei": "本線 1-2 / 1-3。イン超優勢で 1-X 中心の堅い決着", "sign": "イン超優勢で堅い。荒れ要素は少ない。1号艇がB級のときだけ2・3コースの差しまくりを警戒。"}, {"code": "20", "name": "若松", "area": "九州", "water": "海水", "in1": "約56%", "feature": "ナイター。潮と風で水面が動く。ダッシュ勢のまくりが決まりやすい。", "arare": "高", "tenkei": "本線 1-2 だが、4-X / 5-X のダッシュまくりで高配当多発", "sign": "狙い目が水面状況で変わる玄人場。風・潮でダッシュまくりが一気。4・5コースの実力者に注意。"}, {"code": "21", "name": "芦屋", "area": "九州", "water": "淡水", "in1": "約62%(上位)", "feature": "淡水で穏やか。スタートが揃いやすくまくりにくい。イン天国。", "arare": "低", "tenkei": "本線 1-2 / 1-3。まくりにくく 1-X の頭固定が鉄板級", "sign": "イン非常に強く堅い。荒れるのはインのスタート遅れ時のみ。初心者でも狙いやすい鉄板場。"}, {"code": "22", "name": "福岡", "area": "九州", "water": "汽水", "in1": "約54%", "feature": "川と海が交わりうねりが名物。1マーク付近の硬めのうねりで難水面。", "arare": "高", "tenkei": "1-2 本線だが、うねり時は 2-X / 3-1 のまくり差しで荒れる", "sign": "名物うねりで荒れる玄人場。風向き(特に博多湾からの風)とうねりで差し・まくり差し台頭。当地巧者最重視。"}, {"code": "23", "name": "唐津", "area": "九州", "water": "淡水", "in1": "約56%", "feature": "淡水で穏やかだが冬場は強風。前づけ・進入の乱れが起きやすい。", "arare": "中", "tenkei": "本線 1-2 / 1-3。強風・進入乱れ時は 3-1 / 4-1 の攻め", "sign": "冬の強風日は荒れる。前づけ巧者がいると隊形が乱れて波乱。普段は穏やかでイン中心。"}, {"code": "24", "name": "大村", "area": "九州", "water": "海水", "in1": "約57%(後半R高い)", "feature": "全国屈指のイン天国として有名。ただし近年は前半Rで1着率低下、後半Rは68%と高い。", "arare": "低", "tenkei": "後半Rは 1-2 / 1-3 が鉄板級。前半Rは 2-1 / 3-1 の差しも混じる", "sign": "後半Rはイン鉄板。注意は前半R(1〜6R)で1着率が5割割れの日があること。前半は2・3コースも一考。"}]};</script>
<script type="text/babel">
const { useState, useMemo } = React;
const R = window.__D;
const ARARE_COLOR = { "低":"#3fb950", "中":"#d29922", "高":"#f85149" };
const WATER_COLOR = { "淡水":"#58a6ff", "海水":"#3fb1c9", "汽水":"#a371f7" };

function App() {
  const [q, setQ] = useState("");
  const [areaF, setAreaF] = useState("ALL");
  const [arareF, setArareF] = useState("ALL");
  const [open, setOpen] = useState(null);

  const areas = useMemo(() => [...new Set(R.stadiums.map(s => s.area))], []);
  const filtered = useMemo(() => {
    return R.stadiums.filter(s => {
      if (areaF !== "ALL" && s.area !== areaF) return false;
      if (arareF !== "ALL" && s.arare !== arareF) return false;
      if (q) { const t = (parseInt(s.code,10)+s.name+s.feature+s.sign+s.water+s.area).toLowerCase(); if (!t.includes(q.toLowerCase())) return false; }
      return true;
    });
  }, [q, areaF, arareF]);

  return (
    <div style={{minHeight:"100vh",padding:"12px",maxWidth:900,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:4,flexWrap:"wrap"}}>
        <span style={{fontSize:20,fontWeight:800,color:"#ffd166"}}>BOATRACE 24場 特性＆荒れサイン</span>
        <span style={{fontSize:12,color:"#6b7f95"}}>{filtered.length}場</span>
      </div>
      <div style={{fontSize:11,color:"#4a6070",marginBottom:10}}>1着率は2025年前期〜の傾向値（目安）。タップで詳細展開。</div>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        <input placeholder="場名・特徴で検索..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1,minWidth:140,padding:"7px 10px",background:"#162232",color:"#e0e6ed",border:"1px solid #1e2d3d",borderRadius:6,fontSize:13}}/>
        <select value={areaF} onChange={e=>setAreaF(e.target.value)} style={{padding:"7px",background:"#162232",color:"#e0e6ed",border:"1px solid #1e2d3d",borderRadius:6,fontSize:13}}>
          <option value="ALL">全地区</option>
          {areas.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select value={arareF} onChange={e=>setArareF(e.target.value)} style={{padding:"7px",background:"#162232",color:"#e0e6ed",border:"1px solid #1e2d3d",borderRadius:6,fontSize:13}}>
          <option value="ALL">荒れ度すべて</option>
          <option value="低">堅い(低)</option>
          <option value="中">標準(中)</option>
          <option value="高">荒れる(高)</option>
        </select>
      </div>

      <div style={{display:"flex",gap:14,fontSize:11,color:"#8faabe",marginBottom:10,flexWrap:"wrap"}}>
        <span><span style={{color:ARARE_COLOR["低"]}}>●</span> 低=堅い/イン強</span>
        <span><span style={{color:ARARE_COLOR["中"]}}>●</span> 中=標準</span>
        <span><span style={{color:ARARE_COLOR["高"]}}>●</span> 高=波乱多い</span>
      </div>

      <div style={{display:"grid",gap:8}}>
        {filtered.map(s => {
          const isOpen = open === s.code;
          return (
            <div key={s.code} onClick={()=>setOpen(isOpen?null:s.code)} style={{background:"#111d2b",border:"1px solid #1e2d3d",borderRadius:10,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:11,fontWeight:700,color:"#6b7f95",background:"#0b1219",border:"1px solid #2a3d52",borderRadius:6,padding:"2px 7px",minWidth:30,textAlign:"center"}}>{parseInt(s.code,10)}</span>
                <span style={{fontSize:16,fontWeight:800,color:"#e0e6ed",minWidth:54}}>{s.name}</span>
                <span style={{fontSize:11,color:"#6b7f95"}}>{s.area}</span>
                <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:"#0b1219",border:"1px solid "+WATER_COLOR[s.water],color:WATER_COLOR[s.water]}}>{s.water}</span>
                <span style={{fontSize:12,color:"#ffd166",fontWeight:700}}>1コース {s.in1}</span>
                <span style={{marginLeft:"auto",fontSize:11,padding:"3px 10px",borderRadius:10,background:ARARE_COLOR[s.arare]+"22",border:"1px solid "+ARARE_COLOR[s.arare],color:ARARE_COLOR[s.arare],fontWeight:700}}>荒れ度 {s.arare}</span>
                <span style={{fontSize:12,color:"#6b7f95"}}>{isOpen?"▲":"▼"}</span>
              </div>
              {isOpen && (
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e2d3d",fontSize:13,lineHeight:1.7}}>
                  <div style={{marginBottom:8}}><span style={{color:"#8faabe",fontWeight:700}}>水面特性　</span><span style={{color:"#c5d2e0"}}>{s.feature}</span></div>
                  <div style={{marginBottom:8,background:"#0d2030",border:"1px solid #1e3a52",borderRadius:8,padding:"8px 10px"}}>
                    <span style={{color:"#58a6ff",fontWeight:700}}>🎯 典型決着　</span>
                    <span style={{color:"#e0e6ed"}}>{s.tenkei}</span>
                  </div>
                  <div style={{background:ARARE_COLOR[s.arare]+"15",border:"1px solid "+ARARE_COLOR[s.arare]+"55",borderRadius:8,padding:"8px 10px"}}>
                    <span style={{color:ARARE_COLOR[s.arare],fontWeight:700}}>⚠ 荒れるサイン　</span>
                    <span style={{color:"#e0e6ed"}}>{s.sign}</span>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{fontSize:11,color:"#4a6070",marginTop:14,lineHeight:1.6}}>
        ※1着率・傾向は公開データ(艇国データバンク／マクール桧村コラム等)を参考にした目安です。「典型決着」は1着率とコース傾向から導いた傾向の目安であり、実際の出目頻度の実数ではありません(将来レース結果の集計で実数に差し替え予定)。最終判断は当日の風・潮・出走表と合わせてご確認ください。
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
