<style>
:root{--bg:#0b1219;--card:#121d28;--card2:#16242f;--line:#22323f;--ink:#e8eef3;--sub:#8aa0b0;--gold:#ffd166;--rose:#ff7eb6;}

h1 .v{color:var(--gold)}
.lead{font-size:12.5px;color:var(--sub);margin-top:8px}

.ent.top1 .rank{color:var(--gold)}
.waku{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.w1{background:#f4f4f4;color:#111}.w2{background:#1b1b1b;color:#fff;border:1px solid #444}
.w3{background:#e23b3b;color:#fff}.w4{background:#2f7be2;color:#fff}
.w5{background:#f1c40f;color:#111}.w6{background:#3ba55d;color:#fff}
.nm{flex:1;min-width:0}

.nm .full{font-size:15px;font-weight:600}
.sc{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;flex-shrink:0}
.bar{height:5px;border-radius:3px;background:rgba(255,255,255,.07);margin-top:3px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:3px}

.ent{cursor:pointer;-webkit-tap-highlight-color:transparent}
.ent .nm{transition:color .15s}
.ent.open{background:rgba(255,209,102,.04)}
.chev{flex-shrink:0;color:var(--sub);font-size:11px;transition:transform .2s;margin-left:2px}
.ent.open .chev{transform:rotate(90deg)}
.prof{display:none;padding:2px 8px 14px 8px;background:rgba(0,0,0,.18);border-bottom:1px solid rgba(255,255,255,.04)}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cell{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 6px;text-align:center}

.note{margin-top:24px;font-size:11px;color:var(--sub);line-height:1.7;text-align:center}
.foot{margin-top:8px;font-size:10.5px;color:#5a6f7d;text-align:center}

const SEED=20260627;
const ETO=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SANGO=[['申','子','辰'],['寅','午','戌'],['亥','卯','未'],['巳','酉','丑']].map(s=>new Set(s));
const ROKUGO=[['子','丑'],['寅','亥'],['卯','戌'],['辰','酉'],['巳','申'],['午','未']].map(s=>s.join());
const CHU={子:'午',午:'子',丑:'未',未:'丑',寅:'申',申:'寅',卯:'酉',酉:'卯',辰:'戌',戌:'辰',巳:'亥',亥:'巳'};
const ELEM={おひつじ:'火',しし:'火',いて:'火',おうし:'地',おとめ:'地',やぎ:'地',ふたご:'風',てんびん:'風',みずがめ:'風',かに:'水',さそり:'水',うお:'水'};
function eto(y){return ETO[((y-4)%12+12)%12];}
function seiza(mo,d){
 const z=[[1,20,'やぎ'],[2,19,'みずがめ'],[3,21,'うお'],[4,20,'おひつじ'],[5,21,'おうし'],[6,22,'ふたご'],[7,23,'かに'],[8,23,'しし'],[9,23,'おとめ'],[10,24,'てんびん'],[11,23,'さそり'],[12,22,'いて'],[12,31,'やぎ']];
 for(const[em,ed,n]of z){if(mo<em||(mo==em&&d<=ed))return n;}return 'やぎ';
}
const BLOOD={'O,O':.7,'O,A':.8,'O,B':.85,'O,AB':.65,'A,A':.6,'A,B':.5,'A,AB':.75,'B,B':.7,'B,AB':.8,'AB,AB':.6};
function bloodScore(a,b){return BLOOD[a+','+b]??BLOOD[b+','+a]??.5;}
const WARE={昭和:1925,平成:1988,令和:2018};
function parseBirth(s){
 const m=s.match(/(昭和|平成|令和)(\d+)年(\d+)月(\d+)日/);
 return[WARE[m[1]]+ +m[2],+m[3],+m[4]];
}
function score(me,p){
 const[y,mo,d]=parseBirth(p.birth);
 const sB=bloodScore(me.blood,p.blood)*25;
 const pe=ELEM[seiza(mo,d)],meE=me.elem;
 let sE;
 if(pe===meE)sE=25;
 else if((pe=='火'&&meE=='風')||(pe=='風'&&meE=='火')||(pe=='地'&&meE=='水')||(pe=='水'&&meE=='地'))sE=20;
 else if((pe=='火'&&meE=='水')||(pe=='水'&&meE=='火')||(pe=='地'&&meE=='風')||(pe=='風'&&meE=='地'))sE=10;
 else sE=15;
 const pet=eto(y),pair=[pet,me.eto].sort().join();
 let sT;
 if(pet===me.eto)sT=18;
 else if(SANGO.some(g=>g.has(pet)&&g.has(me.eto)))sT=25;
 else if(ROKUGO.includes(pair))sT=23;
 else if(CHU[me.eto]===pet)sT=5;
 else sT=14;
 const base=y*10000+mo*100+d;
 const h=(base*31+SEED*17+p.no*7)%1000;
 const sD=h/1000*25;
 return Math.round(sB+sE+sT+sD);
}
function kana2hira(s){return (s||'').replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
const WCLR=['','w1','w2','w3','w4','w5','w6'];
const BARC=s=>s>=80?'#ffd166':s>=65?'#ff7eb6':s>=50?'#5f9fd6':'#6b7f8c';
function me(){
 const[Y,M,D]=document.getElementById('bd').value.split('-').map(Number);
 return{y:Y,mo:M,d:D,blood:document.getElementById('bl').value,eto:eto(Y),elem:ELEM[seiza(M,D)]};
}
function render(){
 const m=me();
 try{localStorage.setItem('aisho_me',JSON.stringify({bd:document.getElementById('bd').value,bl:m.blood}));}catch(e){}
 document.getElementById('you').innerHTML=`あなた：<b>${seiza(m.mo,m.d)}座</b>・<b>${m.eto}年</b>・<b>${m.blood}型</b>`;
 const byrace={};
 for(const p of DATA){(byrace[p.race]=byrace[p.race]||[]).push(p);}
 const keys=Object.keys(byrace).sort((a,b)=>parseInt(a)-parseInt(b));
 let h='';
 for(const k of keys){
  const arr=byrace[k].map(p=>({...p,sc:score(m,p)})).sort((a,b)=>b.sc-a.sc);
  h+=`<div class="race"><div class="rhead"><div class="rno"><span>${k}</span></div><div class="dl">締切 ${arr[0].dl}</div></div><div class="list">`;
  arr.forEach((p,i)=>{
   h+=`<div class="ent ${i==0?'top1':''}" data-k="${k}" data-w="${p.waku}"><div class="rank">${i+1}位</div><div class="waku ${WCLR[p.waku]}">${p.waku}</div><div class="nm"><span class="kana">${kana2hira(p.kana)}</span><span class="full">${p.name}</span><div class="bar"><i style="width:${p.sc}%;background:${BARC(p.sc)}"></i></div></div><div class="sc">${p.sc}</div><div class="chev">▶</div></div><div class="prof" id="prof-${k}-${p.waku}"></div>`;
  });
  h+='</div></div>';
 }
 document.getElementById('races').innerHTML=h;
}
try{const s=JSON.parse(localStorage.getItem('aisho_me'));if(s){document.getElementById('bd').value=s.bd;document.getElementById('bl').value=s.bl;}}catch(e){}

function profHTML(p){
 const c1=(p.c1||[0,0,0,0,0,0]).map(v=>typeof v==='number'?v:0);
 const cmax=Math.max(...c1,1);
 const lbls=['1','2','3','4','5','6'];
 let bars='';
 c1.forEach((v,idx)=>{
  const col=idx<2?'#ffd166':'#5f9fd6';
  bars+=`<div class="c1row"><div class="c1lb">${lbls[idx]}号</div><div class="c1bar"><i style="width:${v/cmax*100}%;background:${col}"></i></div><div class="c1val">${v.toFixed(1)}%</div></div>`;
 });
 const localHi=parseFloat(p.lcl)>parseFloat(p.win);
 return `<div class="ptop"><span class="rkbadge rk${p.rank}">${p.rank}</span><span><b>${p.branch}</b>支部 / ${p.home}出身 / <b>${p.age}</b>歳 / ${p.ht}cm ${p.wt}kg / <b>${p.blood}</b>型</span></div>
 <div class="grid">
  <div class="cell"><div class="lb">全国勝率</div><div class="vl">${p.win}</div></div>
  <div class="cell ${localHi?'hl':''}"><div class="lb">当地勝率</div><div class="vl">${p.lcl}</div><div class="sub">${localHi?'当地↑':'\u00a0'}</div></div>
  <div class="cell"><div class="lb">平均ST</div><div class="vl">${p.avgst}</div></div>
  <div class="cell"><div class="lb">全国2連率</div><div class="vl">${p.natl2}<span style="font-size:10px">%</span></div></div>
  <div class="cell"><div class="lb">当地2連率</div><div class="vl">${p.lcl2}<span style="font-size:10px">%</span></div></div>
  <div class="cell"><div class="lb">F数</div><div class="vl">${p.f}</div></div>
  <div class="cell"><div class="lb">出走</div><div class="vl">${p.syutsu}</div></div>
  <div class="cell"><div class="lb">1着 / 2着</div><div class="vl" style="font-size:13px">${p.w1} / ${p.w2}</div></div>
  <div class="cell"><div class="lb">優勝</div><div class="vl">${p.yusyo}</div></div>
 </div>
 <div class="c1wrap"><div class="c1ttl">コース別 1着率（黄=イン／青=アウト）</div>${bars}</div>`;
}
document.getElementById('races').addEventListener('click',e=>{
 const ent=e.target.closest('.ent');
 if(!ent)return;
 const k=ent.dataset.k,w=ent.dataset.w;
 const prof=document.getElementById('prof-'+k+'-'+w);
 const open=ent.classList.toggle('open');
 if(open){
  const p=DATA.find(x=>x.race==k&&x.waku==+w);
  if(prof&&!prof.dataset.filled){prof.innerHTML=profHTML(p);prof.dataset.filled='1';}
  prof&&prof.classList.add('show');
 }else{prof&&prof.classList.remove('show');}
});

document.getElementById('bd').addEventListener('change',render);
document.getElementById('bl').addEventListener('change',render);
render();
</script>
